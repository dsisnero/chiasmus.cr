name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: [latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Cache shards
      uses: actions/cache@v4
      with:
        path: lib
        key: shards-${{ runner.os }}-${{ hashFiles('shard.lock') }}
        restore-keys: shards-${{ runner.os }}-

    - name: Cache linter binary
      uses: actions/cache@v4
      with:
        path: bin/ameba
        key: ameba-${{ runner.os }}-${{ hashFiles('shard.lock') }}

    # Note: grammar libraries are NOT cached — compiled .dylib/.so
    # files are platform-specific and incompatible across CI image updates.
    # Rebuilding takes ~2-3min per run.

    # Platform-specific system dependencies
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgmp-dev libssl-dev pkg-config swi-prolog z3
        git clone --depth 1 --branch v0.26.8 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter-lib
        cd /tmp/tree-sitter-lib && make && sudo make install && sudo ldconfig

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install gmp openssl pkg-config swi-prolog z3 tree-sitter

    - name: Install tree-sitter CLI
      run: npm install -g tree-sitter-cli

    - name: Install shards
      run: shards install

    - name: Build linter
      run: |
        mkdir -p bin
        crystal build lib/ameba/src/cli.cr -o bin/ameba

    - name: Compile grammar libraries
      continue-on-error: true
      run: crystal run scripts/setup_grammars.cr

    - name: Run formatter
      run: crystal tool format --check src spec

    - name: Run linter
      run: bin/ameba src

    # Phase 1: Non-grammar tests (must pass - no tree-sitter dependency)
    - name: Run unit + utility tests
      run: |
        crystal spec $(find spec/chiasmus/utils spec/scripts -name '*_spec.cr')

    # Phase 2: Grammar-dependent tests (requires compiled grammars; non-blocking)
    - name: Run discovery + graph tests
      continue-on-error: true
      run: |
        crystal spec $(find spec/chiasmus/discovery spec/chiasmus/graph -name '*_spec.cr' ! -name 'mcp_integration_spec.cr' ! -name 'mcp_transport_spec.cr')

    # Phase 3: Solver + LLM tests (requires Prolog + Z3, optional LLM API key)
    - name: Run solver + LLM tests
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        crystal spec spec/chiasmus/solvers/ spec/chiasmus/formalize/ spec/chiasmus/skills/ spec/chiasmus/dogfood_spec.cr spec/chiasmus/cli_spec.cr spec/chiasmus/agent_cli_spec.cr
