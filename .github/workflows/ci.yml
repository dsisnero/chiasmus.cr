name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: [latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Cache shards
      uses: actions/cache@v4
      with:
        path: lib
        key: shards-${{ runner.os }}-${{ hashFiles('shard.lock') }}
        restore-keys: shards-${{ runner.os }}-

    - name: Cache compiled grammars
      uses: actions/cache@v4
      with:
        path: vendor/grammars
        key: grammars-${{ runner.os }}-${{ hashFiles('scripts/setup_grammars.cr') }}
        restore-keys: grammars-${{ runner.os }}-

    # Platform-specific system dependencies
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgmp-dev libssl-dev pkg-config swi-prolog
        git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter-lib
        cd /tmp/tree-sitter-lib && make && sudo make install && sudo ldconfig

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install gmp openssl pkg-config swi-prolog
        git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter-lib
        cd /tmp/tree-sitter-lib && make && sudo make install

    - name: Install tree-sitter CLI
      uses: baptiste0928/cargo-install@v3
      with:
        crate: tree-sitter-cli

    - name: Install shards
      run: shards install

    - name: Compile grammar libraries
      continue-on-error: true
      run: crystal run scripts/setup_grammars.cr

    - name: Run formatter (unix)
      if: runner.os != 'Windows'
      run: crystal tool format --check src spec

    - name: Run linter (unix)
      if: runner.os != 'Windows'
      run: bin/ameba src

    - name: Run tests (all platforms)
      run: |
        crystal spec $(find spec/chiasmus/discovery spec/chiasmus/graph spec/scripts spec/chiasmus/utils -name '*_spec.cr' ! -name 'mcp_integration_spec.cr' ! -name 'mcp_transport_spec.cr')
      env:
        CI: true

    - name: Run solver + LLM tests (unix only)
      if: runner.os != 'Windows'
      run: |
        crystal spec spec/chiasmus/solvers/ spec/chiasmus/formalize/ spec/chiasmus/skills/ spec/chiasmus/dogfood_spec.cr spec/chiasmus/cli_spec.cr spec/chiasmus/agent_cli_spec.cr
      env:
        CI: true
