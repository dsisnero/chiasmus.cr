name: Windows Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install tree-sitter CLI
      uses: baptiste0928/cargo-install@v3
      with:
        crate: tree-sitter-cli

    - name: Install dependencies
      run: shards install

    - name: Install tree-sitter C library
      shell: bash
      run: |
        git clone --depth 1 --branch v0.26.8 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter-lib
        cd /tmp/tree-sitter-lib && make && make install PREFIX=/c/tree-sitter

    - name: Build binary
      shell: bash
      run: |
        export LIBRARY_PATH="/c/tree-sitter/lib:$LIBRARY_PATH"
        export CPATH="/c/tree-sitter/include:$CPATH"
        crystal build --release -o dist/chiasmus.exe src/chiasmus.cr
